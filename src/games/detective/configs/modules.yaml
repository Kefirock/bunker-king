# ==========================================
# УЛИКИ-МАРКЕРЫ (СЛЕДЫ) 
# ==========================================
markers:
  - text: "Свежая царапина на открытом участке кожи"
    implication: "Недавняя физическая борьба или агрессивный контакт"
  - text: "Едкий запах пороха от одежды"
    implication: "Недавно произвел выстрел из огнестрельного оружия"
  - text: "Следы сырой земли (грязи) на обуви"
    implication: "Выходил на улицу (в сад или на улицу) незадолго до убийства"
  - text: "Резкий специфический запах миндаля"
    implication: "Имел прямой контакт с сильнодействующим ядом (цианидом)"
  - text: "Пятно густого машинного масла на рукаве"
    implication: "Тайком посещал техническое или машинное помещение"
  - text: "Следы черной сажи на кончиках пальцев"
    implication: "Рылся в камине или спешно сжигал важные документы"
  - text: "Насквозь промокшая одежда и волосы"
    implication: "Был снаружи здания под проливным дождем или упал в воду"
  - text: "Обрывок яркой шелковой нити на пуговице"
    implication: "Вступал в тесный телесный контакт с человеком в шелковой одежде"

# ==========================================
# ПОБОЧНЫЕ ЦЕЛИ (ЛОЖНЫЕ СЛЕДЫ - Red Herrings)
# ==========================================
secondary_objectives:
  - name: "Вор"
    desc: "Вы тайно украли ценный предмет из комнаты Жертвы. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ. Ваша цель: скрыть факт кражи, чтобы вас не посадили в тюрьму, и запутать следствие."
  - name: "Тайный любовник"
    desc: "У вас был строго засекреченный роман с Жертвой. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ. Ваша цель: скрыть ваши отношения любой ценой, чтобы избежать публичного позора и скандала."
  - name: "Шантажируемый"
    desc: "Жертва требовала от вас огромные деньги за молчание о вашем темном прошлом. Вы пришли просить пощады. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ. Ваша цель: не дать следователям узнать, что вас шантажировали."
  - name: "Промышленный шпион"
    desc: "Вы проникли сюда, чтобы тайно сфотографировать секретные документы Жертвы. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ. Ваша цель: отвести от себя любые подозрения, чтобы спокойно вынести украденные данные."
  - name: "Должник"
    desc: "Вы задолжали Жертве астрономическую сумму денег и не можете ее вернуть. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ, но смерть кредитора вам очень выгодна. Ваша цель: скрыть факт своего банкротства и долга."
  - name: "Самозванец"
    desc: "Вы находитесь здесь по поддельным документам под чужим именем. ВЫ СТРОГО НЕ УБИВАЛИ ЖЕРТВУ. Ваша цель: не дать никому проверить вашу биографию и узнать ваше настоящее имя."

# ==========================================
# ЖЕРТВЫ
# ==========================================
victims:
  - "Жестокий Тиран (Очень богатый и деспотичный хозяин, которого все ненавидели)"
  - "Безжалостный Шантажист (Человек, который хранил опасный компромат на каждого из гостей)"
  - "Таинственный Незнакомец (Человек без документов, которого никто официально не приглашал)"
  - "Знаменитый Артист (Высокомерная звезда с огромным эго и множеством завистников)"
  - "Коррумпированный Политик (Чиновник, наживший смертельных врагов из-за грязных сделок)"

# ==========================================
# МЕТОДЫ УБИЙСТВА
# ==========================================
methods:
  - "Смертельный Яд (Незаметно подмешан в еду или любимый напиток жертвы)"
  - "Удар ножом в спину (Холодное орудие преступления было оставлено прямо на месте)"
  - "Удушение шелковым шнуром (Тихое нападение сзади, следы борьбы в комнате минимальны)"
  - "Удар тяжелой бронзовой статуэткой по голове (Тупая травма головы в результате внезапной вспышки гнева)"
  - "Выстрел из пистолета в упор (Громкий звук, четкое время убийства, стойкий запах пороха в воздухе)"
  - "Смертельный удар электрическим током (Спланированная ловушка с оголенным проводом или прибором в воде)"