# ==========================================
# ЭПОХИ И ТЕХНОЛОГИИ (TECH LEVELS)
# ==========================================
tech_levels:
  - id: "1890s_victorian"
    name: "Викторианская эпоха (1890-е)"
    constraints: "Строго: Электричества нет, освещение только свечами и керосиновыми лампами. Телефонов нет. Передвижение на конных экипажах. Полицейская экспертиза ограничивается лупой и визуальным осмотром."
  - id: "1920s_golden"
    name: "Золотой век детектива (1920-е)"
    constraints: "Строго: Нет мобильных телефонов, нет камер видеонаблюдения, нет интернета. Связь только через телеграф и редкие стационарные телефоны. Из экспертизы доступна только базовая дактилоскопия (отпечатки пальцев)."
  - id: "1950s_noir"
    name: "Классический нуар (1950-е)"
    constraints: "Строго: Черно-белая эстетика. Есть дисковые стационарные телефоны, автомобили и фотоаппараты со вспышкой. Мобильной связи нет. ДНК-тесты не существуют."
  - id: "1980s_retro"
    name: "Неоновые 1980-е"
    constraints: "Строго: Есть пейджеры, полароидные снимки, кассетные магнитофоны и диктофоны. Мобильных телефонов нет (либо они огромные и привязаны к автомобилю). Компьютеры огромные и без интернета."
  - id: "modern"
    name: "Наши дни (Современность)"
    constraints: "Строго: У каждого персонажа есть смартфон с интернетом. Работают электронные замки и камеры видеонаблюдения. Доступен быстрый ДНК-анализ крови и волос."

